<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vossabia - KI Kundeservice</title>
  <style>
    :root {
      --green-dark:  #2C4A1E;
      --green-mid:   #3D6B2C;
      --green-light: #4A8040;
      --gold:        #C8922A;
      --gold-light:  #DBA83E;
      --white:       #ffffff;
      --gray-bg:     #F5F5F7;
      --gray-subtle: #E8E8ED;
      --gray-text:   #1D1D1F;
      --gray-muted:  #6E6E73;
      --shadow-sm:   0 2px 16px rgba(0,0,0,0.08);
      --shadow-md:   0 8px 40px rgba(0,0,0,0.12);
      --radius:      22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
      background: transparent;
    }

    /* ── Chat bubble trigger ── */
    #chat-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--green-dark);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-md);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      z-index: 999;
    }
    #chat-toggle:hover {
      transform: scale(1.06);
      box-shadow: 0 12px 48px rgba(0,0,0,0.18);
    }
    #chat-toggle svg { color: var(--white); }

    /* Badge for unread */
    #chat-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid var(--white);
      display: none;
    }
    #chat-badge.show { display: block; }

    /* ── Chat window ── */
    #chat-window {
      position: fixed;
      bottom: 92px;
      right: 24px;
      width: 390px;
      max-width: calc(100vw - 32px);
      height: 580px;
      max-height: calc(100vh - 120px);
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 998;
      opacity: 0;
      transform: translateY(20px) scale(0.96);
      pointer-events: none;
      transition: opacity 0.28s cubic-bezier(0.22,1,0.36,1), transform 0.28s cubic-bezier(0.22,1,0.36,1);
    }
    #chat-window.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    /* ── Header ── */
    #chat-header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-subtle);
      padding: 18px 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #chat-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--green-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    #chat-header-text { flex: 1; }
    #chat-header-text h3 {
      color: var(--gray-text);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.1px;
    }
    #chat-header-text p {
      color: var(--gray-muted);
      font-size: 12px;
      font-weight: 400;
      margin-top: 2px;
    }
    #chat-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #34C759;
      display: inline-block;
      margin-right: 5px;
    }
    #close-chat {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-muted);
      padding: 6px;
      border-radius: 50%;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
    }
    #close-chat:hover { color: var(--gray-text); background: var(--gray-bg); }

    /* ── Welcome banner ── */
    #welcome-banner {
      background: var(--gray-bg);
      border-bottom: 1px solid var(--gray-subtle);
      padding: 11px 18px;
      flex-shrink: 0;
    }
    #welcome-banner p {
      font-size: 13px;
      font-weight: 400;
      color: var(--gray-muted);
      line-height: 1.5;
    }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
      background: var(--white);
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--gray-subtle); border-radius: 10px; }

    /* ── Message bubbles ── */
    .message {
      display: flex;
      gap: 8px;
      max-width: 88%;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.28s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }

    .msg-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      margin-top: 4px;
    }
    .bot  .msg-avatar { background: var(--green-dark); }
    .user .msg-avatar { background: var(--gray-subtle); }

    .msg-bubble {
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.65;
      letter-spacing: 0.01em;
    }
    .bot .msg-bubble {
      background: var(--gray-bg);
      color: var(--gray-text);
      border-bottom-left-radius: 5px;
    }
    .user .msg-bubble {
      background: var(--green-dark);
      color: var(--white);
      border-bottom-right-radius: 5px;
    }
    .bot .msg-bubble a {
      color: var(--green-mid);
      text-decoration: underline;
      text-decoration-color: rgba(61,107,44,0.4);
      text-underline-offset: 2px;
      font-weight: 500;
    }
    .bot .msg-bubble a:hover {
      text-decoration-color: var(--green-mid);
    }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      gap: 5px;
      padding: 16px 18px;
      align-items: center;
    }
    .typing-bubble span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gray-muted);
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Quick suggestions ── */
    #suggestions {
      padding: 0 14px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      flex-shrink: 0;
    }
    .suggestion-btn {
      background: var(--white);
      border: 1px solid var(--gray-subtle);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12.5px;
      font-weight: 400;
      color: var(--gray-text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .suggestion-btn:hover {
      background: var(--gray-bg);
      border-color: #C7C7CC;
    }

    /* ── Input area ── */
    #input-area {
      border-top: 1px solid var(--gray-subtle);
      padding: 12px 14px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: var(--white);
    }
    #user-input {
      flex: 1;
      border: 1px solid var(--gray-subtle);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 400;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 100px;
      min-height: 40px;
      background: var(--gray-bg);
      color: var(--gray-text);
      transition: border-color 0.15s, background 0.15s;
      line-height: 1.45;
    }
    #user-input::placeholder { color: #AEAEB2; }
    #user-input:focus {
      border-color: #C7C7CC;
      background: var(--white);
    }

    #send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--green-dark);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    #send-btn:hover  { transform: scale(1.06); }
    #send-btn:active { transform: scale(0.94); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    #send-btn svg { color: var(--white); }

    /* ── Loading screen overlay ── */
    #loading-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.9);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      z-index: 10;
      border-radius: var(--radius);
      backdrop-filter: blur(4px);
    }
    #loading-overlay.show { display: flex; }
    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid var(--gray-subtle);
      border-top-color: var(--green-dark);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mobile ── */
    @media (max-width: 460px) {
      #chat-window {
        bottom: 0;
        right: 0;
        width: 100vw;
        max-width: 100vw;
        height: 100dvh;
        max-height: 100dvh;
        border-radius: 0;
      }
      #chat-toggle { bottom: 16px; right: 16px; }
    }
  </style>
</head>
<body>

<!-- Chat toggle button -->
<button id="chat-toggle" aria-label="Opne chat" title="Chat med Vossabia - KI Kundeservice">
  <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <div id="chat-badge"></div>
</button>

<!-- Chat window -->
<div id="chat-window" role="dialog" aria-label="Vossabia kundeservice chat">

  <!-- Loading overlay (shown while scraping) -->
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
  </div>

  <!-- Header -->
  <div id="chat-header">
    <div id="chat-avatar">🌿</div>
    <div id="chat-header-text">
      <h3>Vossabia - KI Kundeservice</h3>
      <p><span id="chat-status-dot"></span>Naturleg hudpleie frå Voss</p>
    </div>
    <button id="close-chat" aria-label="Lukk chat">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Welcome banner -->
  <div id="welcome-banner">
    <p>Hei! Eg hjelper deg gjerne med å finne rette produktet for din hud og dine behov. Beskriv problemet ditt, og eg kjem med personlege anbefalingar.</p>
  </div>

  <!-- Messages -->
  <div id="messages" aria-live="polite"></div>

  <!-- Quick suggestions -->
  <div id="suggestions">
    <button class="suggestion-btn">Tørr hud</button>
    <button class="suggestion-btn">Sensitiv hud</button>
    <button class="suggestion-btn">Flass / kløe</button>
    <button class="suggestion-btn">Kviser / rosacea</button>
    <button class="suggestion-btn">Bestseljarar</button>
    <button class="suggestion-btn">Gavepakkar</button>
  </div>

  <!-- Input -->
  <div id="input-area">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Skriv ei melding..."
      aria-label="Melding til Vossabia - KI Kundeservice"
    ></textarea>
    <button id="send-btn" aria-label="Send melding" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <p id="chat-footer" style="text-align:center;font-size:10px;color:#bbb;padding:5px 0 7px;flex-shrink:0;"></p>
</div>

<script>
  const VERSION = 'v1.0.3';

  document.getElementById('chat-footer').textContent = `Levert av KI konsulent Innset ${VERSION}`;

  const chatToggle = document.getElementById('chat-toggle');
  const chatWindow = document.getElementById('chat-window');
  const closeChat  = document.getElementById('close-chat');
  const messagesEl = document.getElementById('messages');
  const userInput  = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const badge      = document.getElementById('chat-badge');
  const loadingOverlay = document.getElementById('loading-overlay');
  const suggestions    = document.querySelectorAll('.suggestion-btn');

  let isOpen       = false;
  let isLoading    = false;
  let isReady      = false;
  let messageHistory = [];

  // ── Toggle chat ──────────────────────────────────────────────
  function openChat() {
    isOpen = true;
    chatWindow.classList.add('open');
    chatToggle.setAttribute('aria-label', 'Lukk chat');
    badge.classList.remove('show');
    userInput.focus();
    checkReady();
  }

  function closeWindow() {
    isOpen = false;
    chatWindow.classList.remove('open');
    chatToggle.setAttribute('aria-label', 'Opne chat');
  }

  chatToggle.addEventListener('click', () => isOpen ? closeWindow() : openChat());
  closeChat.addEventListener('click', closeWindow);

  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && isOpen) closeWindow();
  });

  // ── Readiness check ──────────────────────────────────────────
  async function checkReady() {
    if (isReady) return;
    try {
      const r = await fetch('/status');
      const data = await r.json();
      if (data.ready) {
        isReady = true;
        loadingOverlay.classList.remove('show');
        sendBtn.disabled = false;
      } else {
        loadingOverlay.classList.add('show');
        setTimeout(checkReady, 2000);
      }
    } catch {
      setTimeout(checkReady, 3000);
    }
  }

  // Poll once on page load quietly
  setTimeout(checkReady, 500);

  // ── Auto-resize textarea ─────────────────────────────────────
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
  });

  // ── Send on Enter (Shift+Enter = newline) ────────────────────
  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  sendBtn.addEventListener('click', send);

  // ── Suggestions ──────────────────────────────────────────────
  suggestions.forEach(btn => {
    btn.addEventListener('click', () => {
      if (!isReady || isLoading) return;
      userInput.value = btn.textContent;
      send();
    });
  });

  // ── Render message ───────────────────────────────────────────
  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'bot' ? '🌿' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (role === 'bot') {
      // Strip all tags except <a>, then auto-link bare URLs in non-<a> segments
      const sanitized = text.replace(/<(?!\/?(a)\b)[^>]+>/gi, '');
      const linked = sanitized
        .split(/(<a\b[^>]*>.*?<\/a>)/gi)
        .map((part, i) => i % 2 === 0
          ? part.replace(/https?:\/\/[^\s<>"']+/g, url => {
              const clean = url.replace(/[.,;:!?)]+$/, '');
              return `<a href="${clean}" target="_blank" rel="noopener noreferrer">${clean}</a>`;
            })
          : part)
        .join('');
      bubble.innerHTML = linked;
      bubble.querySelectorAll('a').forEach(a => {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
        // Only allow vossabia.no links
        try {
          const url = new URL(a.getAttribute('href'));
          if (!url.hostname.endsWith('vossabia.no')) a.removeAttribute('href');
        } catch { a.removeAttribute('href'); }
      });
    } else {
      bubble.textContent = text;
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '🌿';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble typing-bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // ── Main send function ───────────────────────────────────────
  async function send() {
    if (!isReady || isLoading) return;
    const text = userInput.value.trim();
    if (!text) return;

    // Reset input
    userInput.value = '';
    userInput.style.height = 'auto';

    // Hide suggestions after first message
    document.getElementById('suggestions').style.display = 'none';

    addMessage('user', text);
    messageHistory.push({ role: 'user', content: text });

    isLoading = true;
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: messageHistory }),
      });

      const data = await res.json();
      removeTyping();

      if (data.reply) {
        addMessage('bot', data.reply);
        messageHistory.push({ role: 'assistant', content: data.reply });
        // Show badge if window is closed
        if (!isOpen) badge.classList.add('show');
      } else {
        addMessage('bot', 'Noko gjekk gale. Prøv igjen, eller kontakt oss på post@vossabia.no.');
      }
    } catch {
      removeTyping();
      addMessage('bot', 'Noko gjekk gale. Prøv igjen om litt, eller kontakt oss på post@vossabia.no eller ring +47 90 47 19 88.');
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
  }
</script>
</body>
</html>
